# 应用基础配置
spring:
  application:
    name: meeting
  profiles:
    active: dev

# MyBatis配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  # 如果后续使用 XML 文件，需要指定 mapper-locations
  # mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.youruniversity.meetingroombooking.entity